workflow:
  name: Java模型路由插件开发全流程
  stages:
    - name: 市场验证阶段
      description: 完成市场分析和商业可行性验证
      tasks:
        - agent: 市场与商业分析Agent
          input: "项目目标：开发一个通用、可直接落地、企业级的Java模型路由层插件，作为Jar包直接引入Spring Boot项目，支持多模型统一调用、动态路由、负载均衡、灰度发布、熔断限流等功能。"
          output: docs/market-analysis.md
          timeout: 4h

    - name: 产品设计阶段
      description: 完成产品需求和PRD文档
      tasks:
        - agent: 产品需求分析Agent
          input: "基于市场分析报告docs/market-analysis.md，编写MVP版本的产品需求规格说明书(PRD)。"
          output: docs/prd.md
          timeout: 6h
          depends_on: [市场验证阶段]

    - name: 架构设计阶段
      description: 完成系统架构和技术方案设计
      tasks:
        - agent: 系统架构设计Agent
          input: "基于PRD文档docs/prd.md，设计MVP版本的系统架构、数据库和API接口。"
          output: docs/architecture.md
          timeout: 8h
          depends_on: [产品设计阶段]

    - name: 开发阶段
      description: 并行进行前后端开发
      tasks:
        - agent: 后端开发Agent
          input: "基于架构设计文档docs/architecture.md，实现后端核心功能。"
          output: src/main/java/
          timeout: 24h
          depends_on: [架构设计阶段]
        
        - agent: 前端开发Agent
          input: "基于架构设计文档docs/architecture.md，实现前端管理后台界面。"
          output: src/main/resources/static/
          timeout: 24h
          depends_on: [架构设计阶段]

    - name: 代码审查阶段
      description: 审查所有代码质量
      tasks:
        - agent: 代码审查Agent
          input: "审查src/main/java/和src/main/resources/static/目录下的所有代码，生成代码审查报告。"
          output: docs/code-review-report.md
          timeout: 6h
          depends_on: [开发阶段]

    - name: 测试阶段
      description: 执行全面测试
      tasks:
        - agent: 测试工程师Agent
          input: "基于PRD文档docs/prd.md和代码，编写并执行测试用例，生成测试报告。"
          output: docs/test-report.md
          timeout: 12h
          depends_on: [代码审查阶段]

    - name: 部署阶段
      description: 完成项目部署和CI/CD配置
      tasks:
        - agent: DevOps与部署Agent
          input: "基于项目代码，编写Dockerfile、docker-compose.yml和GitHub Actions配置文件。"
          output: Dockerfile, docker-compose.yml, .github/workflows/
          timeout: 6h
          depends_on: [测试阶段]

    - name: 文档阶段
      description: 完成所有技术文档
      tasks:
        - agent: 文档与知识管理Agent
          input: "基于项目代码和所有文档，编写完整的README.md、用户手册和开发手册。"
          output: README.md, docs/user-guide.md, docs/developer-guide.md
          timeout: 8h
          depends_on: [部署阶段]

  settings:
    auto_approve: false  # 每个阶段完成后需要你手动确认才能进入下一阶段
    max_retries: 2       # 任务失败后自动重试2次
    parallel_tasks: true # 允许并行执行无依赖的任务