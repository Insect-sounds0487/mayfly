<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayfly Demo - API 测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .status-text {
            color: #0369a1;
            font-weight: 500;
        }
        
        .chat-container {
            background: #f8fafc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
        }
        
        .user-message {
            background: #667eea;
            color: white;
            margin-left: 40px;
        }
        
        .ai-message {
            background: white;
            color: #333;
            margin-right: 40px;
            border: 1px solid #e2e8f0;
        }
        
        .message-label {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            opacity: 0.8;
        }
        
        .input-container {
            display: flex;
            gap: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .api-info {
            margin-top: 30px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 10px;
        }
        
        .api-info h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .api-endpoint {
            display: inline-block;
            padding: 5px 10px;
            background: #e0e7ff;
            color: #4338ca;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦋 Mayfly Demo</h1>
        <p class="subtitle">多模型路由框架 - API 测试界面</p>
        
        <div class="status-bar">
            <div class="status-dot"></div>
            <span class="status-text">服务运行中 - http://localhost:8080</span>
        </div>
        
        <div class="chat-container" id="chatContainer">
            <div class="message ai-message">
                <div class="message-label">AI</div>
                <div>你好！我是 Mayfly 助手，有什么可以帮助你的吗？</div>
            </div>
        </div>
        
        <div class="input-container">
            <input type="text" id="messageInput" placeholder="输入你的消息..." onkeypress="handleKeyPress(event)">
            <button id="sendButton" onclick="sendMessage()">发送</button>
        </div>
        
        <div class="api-info">
            <h3>📡 可用的 API 端点</h3>
            <div class="api-endpoint">GET /api/chat/health</div>
            <div class="api-endpoint">POST /api/chat/send</div>
            <div class="api-endpoint">POST /api/chat/send-with-metadata</div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8080/api/chat/send';
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const button = document.getElementById('sendButton');
            const container = document.getElementById('chatContainer');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            container.innerHTML += `
                <div class="message user-message">
                    <div class="message-label">你</div>
                    <div>${escapeHtml(message)}</div>
                </div>
            `;
            
            // 清空输入框并禁用按钮
            input.value = '';
            button.disabled = true;
            button.innerHTML = '<span class="loading"></span>';
            
            // 滚动到底部
            container.scrollTop = container.scrollHeight;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                
                // 添加 AI 回复
                container.innerHTML += `
                    <div class="message ai-message">
                        <div class="message-label">AI (${data.model || 'unknown'})</div>
                        <div>${escapeHtml(data.message)}</div>
                    </div>
                `;
            } catch (error) {
                container.innerHTML += `
                    <div class="message ai-message" style="border-color: #ef4444; background: #fef2f2;">
                        <div class="message-label" style="color: #dc2626;">错误</div>
                        <div style="color: #991b1b;">请求失败: ${error.message}</div>
                    </div>
                `;
            } finally {
                button.disabled = false;
                button.innerHTML = '发送';
                container.scrollTop = container.scrollHeight;
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
