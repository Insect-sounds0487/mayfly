mayfly:
  enabled: true
  
  # 模型配置 - 国产模型深度适配
  models:
    # DeepSeek 配置
    - name: deepseek-primary
      provider: deepseek
      api-key: ${DEEPSEEK_API_KEY:sk-5e0c0e0cc3f4495c96d9180b042622cf}
      model: deepseek-chat
      weight: 40
      timeout: 30000
      max-retries: 2
      tags:
        - primary
        - chinese
    
    - name: deepseek-backup
      provider: deepseek
      api-key: ${DEEPSEEK_API_KEY:sk-5e0c0e0cc3f4495c96d9180b042622cf}
      model: deepseek-chat
      weight: 20
      timeout: 30000
      max-retries: 2
      tags:
        - backup
        - chinese
    
    # 智谱 AI 配置
    - name: zhipu-primary
      provider: zhipu
      api-key: ${ZHIPU_API_KEY:e11709bbd96e4a22a096a3b15615ab36.vr7f07ygiabasgEQ}
      model: glm-4
      weight: 25
      timeout: 30000
      max-retries: 2
      tags:
        - primary
        - chinese
    
    # 通义千问配置
    - name: tongyi-primary
      provider: tongyi
      api-key: ${TONGYI_API_KEY:sk-fe7e4e6a32194b62a84679e64bcbd7c5}
      model: qwen-max
      weight: 15
      timeout: 30000
      max-retries: 2
      tags:
        - primary
        - chinese
  
  # 路由配置
  router:
    strategy: weighted  # fixed, weighted, rule-based
  
  # 负载均衡配置
  loadbalancer:
    strategy: weighted-round-robin  # round-robin, weighted-round-robin
    health-check:
      enabled: true
      interval: 30s
      timeout: 5s
      unhealthy-threshold: 3
  
  # 故障转移配置
  failover:
    enabled: true
    max-retries: 2
    cooldown-duration: 60s
    retryable-exceptions:
      - java.net.SocketTimeoutException
      - org.springframework.web.client.HttpServerErrorException
  
  # 熔断器配置
  circuit-breaker:
    enabled: true
    failure-rate-threshold: 50
    wait-duration-in-open-state: 60s
    sliding-window-size: 10
    minimum-number-of-calls: 5
  
  # 限流器配置
  rate-limiter:
    enabled: true
    limit-refresh-period: 1s
    limit-for-period: 100
    timeout-duration: 0s
  
  # 监控配置
  monitor:
    enabled: true

# Spring Boot 配置
spring:
  application:
    name: mayfly-demo
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:your-openai-api-key}

# 服务器配置
server:
  port: 8080

# 日志配置
logging:
  level:
    io.mayfly: DEBUG
    org.springframework.ai: INFO
